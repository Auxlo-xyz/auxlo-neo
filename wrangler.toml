name = "auxlo-neo"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# KV namespaces -- create with: wrangler kv namespace create SESSIONS
[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_ME"  # Run: wrangler kv namespace create SESSIONS

[[kv_namespaces]]
binding = "MEMORY"
id = "REPLACE_ME"  # Run: wrangler kv namespace create MEMORY

[[kv_namespaces]]
binding = "CONFIG"
id = "REPLACE_ME"  # Run: wrangler kv namespace create CONFIG

# Secrets (set via CLI, never in this file):
# wrangler secret put OPENAI_API_KEY
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put GOOGLE_API_KEY
# wrangler secret put OPENROUTER_API_KEY
# wrangler secret put GROQ_API_KEY
# wrangler secret put DEEPSEEK_API_KEY
# wrangler secret put TELEGRAM_BOT_TOKEN
# wrangler secret put TELEGRAM_WEBHOOK_SECRET
# wrangler secret put DISCORD_BOT_TOKEN
# wrangler secret put DISCORD_PUBLIC_KEY
# wrangler secret put DISCORD_APPLICATION_ID
# wrangler secret put API_KEY

# Optional cron triggers
# [triggers]
# crons = ["0 */6 * * *"]  # Every 6 hours
